name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements.txt
      - run: pytest -q
      - name: Smoke test (offline end-to-end)
        run: |
          python -m graphrag_agent.cli build examples/sample.txt --graph /tmp/kg.json
          python -m graphrag_agent.cli ask "How is MessageSense connected to MQTT?" --graph /tmp/kg.json
        env:
          PYTHONPATH: src
